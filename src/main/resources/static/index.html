<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Sprint Metrics</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Employee Sprint Metrics</h1>
            <p class="subtitle">Submit your 2-week sprint metrics</p>
        </header>

        <section class="form-section card">
            <h2>Submit Metrics</h2>
            <form id="metricsForm">
                <div class="form-row">
                    <label for="sprintId">Sprint *</label>
                    <select id="sprintId" name="sprintId" required>
                        <option value="">-- Select Sprint --</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="employeeId">Employee ID *</label>
                    <input type="text" id="employeeId" name="employeeId" required placeholder="e.g. EMP001">
                </div>
                <div class="form-grid">
                    <div class="form-row">
                        <label for="pointsCommitted">Points Committed *</label>
                        <input type="number" id="pointsCommitted" name="pointsCommitted" min="0" required>
                    </div>
                    <div class="form-row">
                        <label for="pointsDelivered">Points Delivered *</label>
                        <input type="number" id="pointsDelivered" name="pointsDelivered" min="0" required>
                    </div>
                    <div class="form-row">
                        <label for="bugsCount">Bugs Count *</label>
                        <input type="number" id="bugsCount" name="bugsCount" min="0" required>
                    </div>
                    <div class="form-row">
                        <label for="pullRequestCount">Pull Request Count *</label>
                        <input type="number" id="pullRequestCount" name="pullRequestCount" min="0" required>
                    </div>
                    <div class="form-row">
                        <label for="spilloverPoints">Spillover Points *</label>
                        <input type="number" id="spilloverPoints" name="spilloverPoints" min="0" required value="0">
                    </div>
                </div>
                <div class="form-row full-width">
                    <label for="spilloverReason">Reason for Spillover (if any)</label>
                    <textarea id="spilloverReason" name="spilloverReason" rows="3" placeholder="Optional"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn">Submit Metrics</button>
                    <button type="button" id="resetBtn">Reset</button>
                </div>
            </form>
            <div id="formMessage" class="message hidden"></div>
        </section>

        <section class="list-section card">
            <h2>Metrics for Selected Sprint</h2>
            <div class="sprint-filter">
                <label for="viewSprintId">View sprint:</label>
                <select id="viewSprintId">
                    <option value="">-- Select Sprint --</option>
                </select>
                <button type="button" id="refreshBtn">Refresh</button>
            </div>
            <div id="metricsTableWrap">
                <p id="emptyMessage" class="empty-message">Select a sprint to view metrics.</p>
                <table id="metricsTable" class="metrics-table hidden">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Points Committed</th>
                            <th>Points Delivered</th>
                            <th>Bugs</th>
                            <th>PRs</th>
                            <th>Spillover</th>
                            <th>Spillover Reason</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
